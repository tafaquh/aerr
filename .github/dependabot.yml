version: 2

updates:
  # A single gomod entry covering every module in the workspace (root plus
  # each go.work member). Using `directories` instead of five separate
  # `directory` entries means a version bump that touches shared or
  # cross-module dependencies (e.g. zerolog, zap, or their transitive
  # deps) arrives as one PR with consistent versions everywhere, instead
  # of five skewed PRs that fail the workspace-wide `go mod tidy -diff`
  # CI check.
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/zerolog"
      - "/zap"
      - "/benchmarks"
      - "/examples"
    schedule:
      interval: "weekly"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-dependencies:
        patterns:
          - "*"
